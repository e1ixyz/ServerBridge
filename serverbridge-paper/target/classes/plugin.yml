name: ServerBridgePaper
version: 0.1.0
main: dev.e1ixyz.serverbridge.paper.ServerBridgePaperPlugin
api-version: "1.21"
authors:
  - e1ixyz
commands:
  stash:
    description: Opens the shared proxy network stash.
    aliases:
      - networkstash
      - networkec
      - nec
  stashlog:
    description: Views paginated shared stash audit logs.
    aliases:
      - stashlogs
    permission: serverbridge.stashlog
  stashreset:
    description: Resets a player's daily stash deposit/withdraw usage.
    permission: serverbridge.stashreset
  stashtoggle:
    description: Enables or disables the shared proxy network stash.
    permission: serverbridge.stashtoggle
permissions:
  serverbridge.stashlog:
    default: op
  serverbridge.stashreset:
    default: op
  serverbridge.stashtoggle:
    default: op
